<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>NewsAnchor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <span class="logo">📡</span>
    <h1>NewsAnchor</h1>
  </header>

  <section class="status">
    <div class="row"><span class="label">Dernière MAJ</span><span class="value" id="last-fetch">—</span></div>
    <div class="row"><span class="label">Événements</span><span class="value" id="event-count">—</span></div>
  </section>

  <section class="actions">
    <button id="refresh">↻ Rafraîchir le calendrier</button>
    <button id="toggle-popup">Afficher / masquer le popup</button>
    <button id="reset-position">Réinitialiser la position</button>
  </section>

  <section class="filters">
    <h2>Filtres d'impact</h2>
    <label><input type="checkbox" data-impact="high" /> <span class="dot dot-high"></span> Impact haut</label>
    <label><input type="checkbox" data-impact="medium" /> <span class="dot dot-medium"></span> Impact moyen</label>
    <label><input type="checkbox" data-impact="low" /> <span class="dot dot-low"></span> Impact bas</label>
    <label><input type="checkbox" data-impact="holiday" /> <span class="dot dot-holiday"></span> Jours fériés</label>
  </section>

  <footer>
    <a href="https://www.forexfactory.com/calendar" target="_blank" rel="noopener">Source : Forex Factory</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
